<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <!-- 终端窗口背景 -->
  <rect width="128" height="128" rx="12" fill="#0d1117"/>
  <rect width="128" height="128" rx="12" stroke="#30363d" stroke-width="1.5"/>
  <!-- 标题栏三个点 -->
  <circle cx="20" cy="20" r="5" fill="#f85149"/>
  <circle cx="36" cy="20" r="5" fill="#d29922"/>
  <circle cx="52" cy="20" r="5" fill="#3fb950"/>
  <!-- 终端提示符 -->
  <text x="20" y="60" font-family="monospace" font-size="20" font-weight="bold" fill="#58a6ff">></text>
  <text x="42" y="60" font-family="monospace" font-size="18" fill="#3fb950">mcmod</text>
  <text x="42" y="84" font-family="monospace" font-size="14" fill="#8b949e">modern</text>
  <!-- 光标 -->
  <rect x="20" y="100" width="10" height="2" rx="1" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
